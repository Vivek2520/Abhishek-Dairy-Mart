<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - WhatsApp Order System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header & Cart Icon */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 0;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f39c12;
        }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
        }

        .cart-icon {
            font-size: 1.8rem;
            color: #ecf0f1;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #e74c3c;
            color: white;
            font-size: 0.8rem;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Product Section */
        .products-section {
            padding: 40px 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
            font-size: 2.2rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .product-img {
            height: 200px;
            background-color: #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #7f8c8d;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .product-price {
            font-size: 1.4rem;
            color: #e74c3c;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .add-to-cart-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }

        .add-to-cart-btn:hover {
            background-color: #2980b9;
        }

        /* Cart Modal */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .cart-content {
            background-color: white;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .cart-header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-title {
            font-size: 1.5rem;
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .cart-body {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .cart-items {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .cart-items th {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 2px solid #ecf0f1;
            color: #2c3e50;
        }

        .cart-items td {
            padding: 15px 10px;
            border-bottom: 1px solid #ecf0f1;
        }

        .item-name {
            font-weight: 600;
        }

        .item-quantity {
            display: flex;
            align-items: center;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            background-color: #ecf0f1;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .quantity-value {
            margin: 0 10px;
            min-width: 30px;
            text-align: center;
        }

        .item-price {
            color: #e74c3c;
            font-weight: 600;
        }

        .remove-item {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .cart-footer {
            background-color: #f8f9fa;
            padding: 20px;
            border-top: 1px solid #ecf0f1;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .customer-details {
            margin-bottom: 20px;
        }

        .details-title {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .details-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .order-btn {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;
        }

        .order-btn:hover {
            background-color: #128C7E;
        }

        .order-btn i {
            margin-right: 10px;
            font-size: 1.2rem;
        }

        .empty-cart-message {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .empty-cart-message i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #bdc3c7;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .details-form {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            .cart-items th, .cart-items td {
                padding: 10px 5px;
            }
            
            .item-quantity {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .quantity-value {
                margin: 5px 0;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .cart-content {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <!-- Header with Cart Icon -->
    <header>
        <div class="container header-content">
            <div class="logo">ShopEasy</div>
            <div class="cart-icon-container" id="cartIcon">
                <i class="fas fa-shopping-cart cart-icon"></i>
                <div class="cart-count" id="cartCount">0</div>
            </div>
        </div>
    </header>

    <!-- Products Section -->
    <section class="products-section">
        <div class="container">
            <h2 class="section-title">Our Products</h2>
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h3 class="cart-title">Your Shopping Cart</h3>
                <button class="close-cart" id="closeCart">&times;</button>
            </div>
            
            <div class="cart-body" id="cartBody">
                <!-- Cart items will be loaded here by JavaScript -->
            </div>
            
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total Amount:</span>
                    <span id="cartTotal">₹0</span>
                </div>
                
                <div class="customer-details">
                    <h4 class="details-title">Customer Details</h4>
                    <form class="details-form" id="customerForm">
                        <div class="form-group">
                            <label for="customerName">Full Name *</label>
                            <input type="text" id="customerName" required placeholder="Enter your name">
                        </div>
                        <div class="form-group">
                            <label for="customerPhone">Phone Number *</label>
                            <input type="tel" id="customerPhone" required placeholder="Enter your phone number">
                        </div>
                        <div class="form-group full-width">
                            <label for="customerAddress">Delivery Address *</label>
                            <textarea id="customerAddress" required placeholder="Enter your complete delivery address"></textarea>
                        </div>
                    </form>
                </div>
                
                <button class="order-btn" id="whatsappOrderBtn">
                    <i class="fab fa-whatsapp"></i> Order on WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script>
        // Sample products data
        const products = [
            { id: 1, name: "Wireless Headphones", price: 1299, icon: "🎧" },
            { id: 2, name: "Smart Watch", price: 3599, icon: "⌚" },
            { id: 3, name: "Bluetooth Speaker", price: 1999, icon: "🔈" },
            { id: 4, name: "Mobile Power Bank", price: 899, icon: "🔋" },
            { id: 5, name: "USB-C Cable", price: 299, icon: "🔌" },
            { id: 6, name: "Wireless Mouse", price: 599, icon: "🖱️" },
            { id: 7, name: "Laptop Stand", price: 799, icon: "💻" },
            { id: 8, name: "Phone Case", price: 399, icon: "📱" }
        ];

        // Cart state
        let cart = [];
        
        // DOM Elements
        const cartIcon = document.getElementById('cartIcon');
        const cartCount = document.getElementById('cartCount');
        const cartModal = document.getElementById('cartModal');
        const closeCart = document.getElementById('closeCart');
        const cartBody = document.getElementById('cartBody');
        const cartTotal = document.getElementById('cartTotal');
        const productsGrid = document.getElementById('productsGrid');
        const whatsappOrderBtn = document.getElementById('whatsappOrderBtn');
        const customerForm = document.getElementById('customerForm');
        
        // Initialize the product listing
        function initializeProducts() {
            productsGrid.innerHTML = '';
            
            products.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                
                productCard.innerHTML = `
                    <div class="product-img">${product.icon}</div>
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">₹${product.price}</div>
                        <button class="add-to-cart-btn" data-id="${product.id}">
                            Add to Cart
                        </button>
                    </div>
                `;
                
                productsGrid.appendChild(productCard);
            });
            
            // Add event listeners to "Add to Cart" buttons
            document.querySelectorAll('.add-to-cart-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const productId = parseInt(this.getAttribute('data-id'));
                    addToCart(productId);
                });
            });
        }
        
        // Add item to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            
            // Check if product already in cart
            const existingItemIndex = cart.findIndex(item => item.id === productId);
            
            if (existingItemIndex !== -1) {
                // Increase quantity if already in cart
                cart[existingItemIndex].quantity += 1;
            } else {
                // Add new item to cart
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    icon: product.icon,
                    quantity: 1
                });
            }
            
            updateCartUI();
            
            // Show feedback
            const feedback = document.createElement('div');
            feedback.style.cssText = `
                position: fixed;
                top: 80px;
                right: 20px;
                background-color: #2ecc71;
                color: white;
                padding: 12px 20px;
                border-radius: 5px;
                box-shadow: 0 3px 10px rgba(0,0,0,0.2);
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            feedback.innerHTML = `<i class="fas fa-check-circle"></i> ${product.name} added to cart`;
            document.body.appendChild(feedback);
            
            // Remove feedback after 2 seconds
            setTimeout(() => {
                feedback.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => feedback.remove(), 300);
            }, 2000);
            
            // Add CSS for animation
            if (!document.querySelector('#feedback-styles')) {
                const style = document.createElement('style');
                style.id = 'feedback-styles';
                style.textContent = `
                    @keyframes slideIn {
                        from { transform: translateX(100%); opacity: 0; }
                        to { transform: translateX(0); opacity: 1; }
                    }
                    @keyframes slideOut {
                        from { transform: translateX(0); opacity: 1; }
                        to { transform: translateX(100%); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }
        }
        
        // Remove item from cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }
        
        // Update item quantity
        function updateQuantity(productId, newQuantity) {
            if (newQuantity < 1) {
                removeFromCart(productId);
                return;
            }
            
            const itemIndex = cart.findIndex(item => item.id === productId);
            if (itemIndex !== -1) {
                cart[itemIndex].quantity = newQuantity;
            }
            
            updateCartUI();
        }
        
        // Calculate cart total
        function calculateTotal() {
            return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
        }
        
        // Update cart UI
        function updateCartUI() {
            // Update cart count
            const totalItems = cart.reduce((total, item) => total + item.quantity, 0);
            cartCount.textContent = totalItems;
            
            // Update cart modal content
            if (cart.length === 0) {
                cartBody.innerHTML = `
                    <div class="empty-cart-message">
                        <i class="fas fa-shopping-cart"></i>
                        <h3>Your cart is empty</h3>
                        <p>Add some products to your cart to see them here</p>
                    </div>
                `;
                cartTotal.textContent = '₹0';
                return;
            }
            
            // Generate cart items table
            let cartHTML = `
                <table class="cart-items">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            cart.forEach(item => {
                cartHTML += `
                    <tr>
                        <td class="item-name">
                            <div style="display: flex; align-items: center;">
                                <span style="font-size: 1.5rem; margin-right: 10px;">${item.icon}</span>
                                ${item.name}
                            </div>
                        </td>
                        <td>
                            <div class="item-quantity">
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                <span class="quantity-value">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                            </div>
                        </td>
                        <td class="item-price">₹${item.price * item.quantity}</td>
                        <td>
                            <button class="remove-item" onclick="removeFromCart(${item.id})">
                                <i class="fas fa-trash"></i> Remove
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            cartHTML += '</tbody></table>';
            cartBody.innerHTML = cartHTML;
            
            // Update total
            cartTotal.textContent = `₹${calculateTotal()}`;
        }
        
        // Generate WhatsApp order message
        function generateWhatsAppMessage() {
            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            const address = document.getElementById('customerAddress').value;
            
            let message = `Hello! I would like to place an order.\n\n`;
            message += `*Customer Details:*\n`;
            message += `Name: ${name}\n`;
            message += `Phone: ${phone}\n`;
            message += `Address: ${address}\n\n`;
            message += `*Order Items:*\n`;
            
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} x ${item.quantity} = ₹${item.price * item.quantity}\n`;
            });
            
            message += `\n*Total Amount: ₹${calculateTotal()}*`;
            
            return encodeURIComponent(message);
        }
        
        // Event Listeners
        cartIcon.addEventListener('click', () => {
            cartModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });
        
        closeCart.addEventListener('click', () => {
            cartModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        });
        
        // Close modal when clicking outside
        cartModal.addEventListener('click', (e) => {
            if (e.target === cartModal) {
                cartModal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });
        
        // WhatsApp order button click
        whatsappOrderBtn.addEventListener('click', () => {
            // Check if cart is empty
            if (cart.length === 0) {
                alert('Your cart is empty. Please add items to your cart before placing an order.');
                return;
            }
            
            // Validate form
            if (!customerForm.checkValidity()) {
                customerForm.reportValidity();
                return;
            }
            
            const phone = document.getElementById('customerPhone').value;
            const message = generateWhatsAppMessage();
            
            // WhatsApp API URL (using the phone number from form)
            // Note: In a real application, you might want to use your business number
            const whatsappUrl = `https://wa.me/91${phone}?text=${message}`;
            
            // Open WhatsApp in a new tab
            window.open(whatsappUrl, '_blank');
        });
        
        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            initializeProducts();
            updateCartUI();
        });
        
        // Make functions available globally for inline event handlers
        window.addToCart = addToCart;
        window.removeFromCart = removeFromCart;
        window.updateQuantity = updateQuantity;
    </script>
</body>
</html>
