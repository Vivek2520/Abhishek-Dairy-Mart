<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Abhishek Dairy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="reset" class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
    <main class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Reset Password</h1>
        <p class="text-slate-600 mb-6">Set a new password for your account.</p>

        <div id="formMessage" class="hidden mb-4"></div>

        <form id="resetForm" class="space-y-4">
            <div>
                <label for="resetToken" class="block text-sm font-medium text-slate-700 mb-1">Reset Token</label>
                <input id="resetToken" type="text" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
                <label for="newPassword" class="block text-sm font-medium text-slate-700 mb-1">New Password</label>
                <input id="newPassword" type="password" required minlength="8" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
                <input id="confirmPassword" type="password" required minlength="8" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-2.5">
                Update Password
            </button>
        </form>

        <p class="mt-6 text-sm text-center text-slate-700">
            Back to <a href="/login" class="text-blue-600 hover:underline">Login</a>
        </p>
    </main>

    <script type="module" src="/public/js/authPages.js"></script>
</body>
</html>
