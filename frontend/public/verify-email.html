<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email | Abhishek Dairy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="verify" class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
    <main class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Verify Email OTP</h1>
        <p class="text-slate-600 mb-6">Enter the OTP sent to your email address.</p>

        <div id="formMessage" class="hidden mb-4"></div>

        <form id="verifyForm" class="space-y-4">
            <div>
                <label for="verifyEmail" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input id="verifyEmail" type="email" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
                <label for="verifyOtp" class="block text-sm font-medium text-slate-700 mb-1">OTP</label>
                <input id="verifyOtp" type="text" required maxlength="6" class="w-full border rounded-lg px-3 py-2 tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-2.5">
                Verify OTP
            </button>
        </form>

        <button id="resendOtpBtn" type="button" class="mt-4 w-full border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium rounded-lg py-2.5">
            Resend OTP
        </button>

        <p class="mt-6 text-sm text-center text-slate-700">
            Back to <a href="/login" class="text-blue-600 hover:underline">Login</a>
        </p>
    </main>

    <script type="module" src="/public/js/authPages.js"></script>
</body>
</html>
