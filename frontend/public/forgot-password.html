<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Buy dairy products online in your area">
    <title>Abhishek Dairy Mart – Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body data-page="forgot" class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
    <main class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Forgot Password</h1>
        <p class="text-slate-600 mb-6">Enter your email to receive a password reset link.</p>

        <div id="formMessage" class="hidden mb-4"></div>

        <form id="forgotForm" class="space-y-4">
            <div>
                <label for="forgotEmail" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input id="forgotEmail" type="email" required
                    class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-2.5">
                Send Reset Link
            </button>
        </form>

        <p class="mt-6 text-sm text-center text-slate-700">
            Back to <a href="/login" class="text-blue-600 hover:underline">Login</a>
        </p>
    </main>

    <script type="module" src="/public/js/authPages.js"></script>
</body>

</html>
