<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Abhishek Dairy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="login" class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
    <main class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">Customer Login</h1>
        <p class="text-slate-600 mb-6">Sign in to access your account and continue shopping.</p>

        <div id="formMessage" class="hidden mb-4"></div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="loginIdentifier" class="block text-sm font-medium text-slate-700 mb-1">Email or Username</label>
                <input id="loginIdentifier" type="text" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
                <label for="loginPassword" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input id="loginPassword" type="password" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <label class="flex items-center gap-2 text-sm text-slate-700">
                <input id="rememberMe" type="checkbox" class="rounded border-slate-300">
                Remember Me
            </label>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-2.5">
                Login
            </button>
        </form>

        <div class="my-4 flex items-center gap-3 text-slate-400 text-sm">
            <span class="h-px bg-slate-200 flex-1"></span>
            or
            <span class="h-px bg-slate-200 flex-1"></span>
        </div>

        <div id="googleLoginButton" class="flex justify-center"></div>

        <div class="mt-6 flex justify-between text-sm">
            <a href="/forgot-password" class="text-blue-600 hover:underline">Forgot password?</a>
            <a href="/signup" class="text-blue-600 hover:underline">Create account</a>
        </div>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/public/js/authPages.js"></script>
</body>
</html>
